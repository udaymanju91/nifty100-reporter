name: Nifty 100 Daily Reporter

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'Who initiated this run: github-schedule, cron-job-org, or manual'
        required: false
        default: 'manual'

permissions:
  contents: write
  actions: read

jobs:
  run-reporter:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject Gmail password into config
        run: |
          sed -i 's/__GMAIL_APP_PASSWORD__/${{ secrets.GMAIL_APP_PASSWORD }}/g' config.json

      - name: Set run metadata
        id: metadata
        run: |
          echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "CURRENT_RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "TRIGGER_SOURCE=github-schedule" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.trigger_source }}" = "cron-job-org" ]; then
            echo "TRIGGER_SOURCE=cron-job-org" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TRIGGER_SOURCE=manual execution" >> $GITHUB_ENV
          else
            echo "TRIGGER_SOURCE=${{ github.event_name }}" >> $GITHUB_ENV
          fi

      - name: Check if workflow already succeeded today
        id: already_ran
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = context.workflow;
            const currentRunId = context.runId;
            const today = new Date().toISOString().slice(0, 10);

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              per_page: 50
            });

            const alreadyRan = runs.data.workflow_runs.some(run => {
              const runDate = new Date(run.created_at).toISOString().slice(0, 10);
              return run.id !== currentRunId && run.conclusion === 'success' && runDate === today;
            });

            core.setOutput('skip', alreadyRan ? 'true' : 'false');

      - name: Initialize log file header
        run: |
          mkdir -p logs
          {
            echo "============================================================"
            echo "NIFTY 100 DAILY REPORTER"
            echo "Run ID          : ${{ github.run_id }}"
            echo "Workflow        : ${{ github.workflow }}"
            echo "GitHub Event    : ${{ github.event_name }}"
            echo "Trigger Source  : ${TRIGGER_SOURCE}"
            echo "Branch / Ref    : ${{ github.ref_name }}"
            echo "Run Date (UTC)  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "============================================================"
          } > logs/run_github_output.log

      - name: Skip duplicate same-day execution
        if: steps.already_ran.outputs.skip == 'true'
        run: |
          {
            echo "SKIP DECISION    : YES"
            echo "Reason           : A successful run for this workflow already exists today."
            echo "Requested by     : ${TRIGGER_SOURCE}"
            echo "Action Taken     : Main Python execution skipped."
            echo "============================================================"
          } | tee -a logs/run_github_output.log

      - name: Run Nifty 100 Reporter
        if: steps.already_ran.outputs.skip != 'true'
        id: run_script
        run: |
          {
            echo "SKIP DECISION    : NO"
            echo "Reason           : No successful run found yet for today."
            echo "Execution Source : ${TRIGGER_SOURCE}"
            echo "============================================================"
          } | tee -a logs/run_github_output.log
          python nifty100_Report_Final_19042026.py 2>&1 | tee -a logs/run_github_output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Set run status for skipped run
        if: steps.already_ran.outputs.skip == 'true'
        id: status_skipped
        run: |
          echo "result=SKIPPED" >> $GITHUB_OUTPUT
          echo "emoji=⏭️" >> $GITHUB_OUTPUT

      - name: Set run status
        if: steps.already_ran.outputs.skip != 'true'
        id: status
        run: |
          if [ "${{ steps.run_script.outputs.exit_code }}" = "0" ]; then
            echo "result=SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "result=FAILURE" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Normalize final status
        id: final_status
        run: |
          if [ "${{ steps.already_ran.outputs.skip }}" = "true" ]; then
            echo "result=SKIPPED" >> $GITHUB_OUTPUT
            echo "emoji=⏭️" >> $GITHUB_OUTPUT
          elif [ "${{ steps.run_script.outputs.exit_code }}" = "0" ]; then
            echo "result=SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "result=FAILURE" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Find output files
        id: find_files
        if: always()
        run: |
          HTML=$(ls -t reports/nifty100_daily_report_*.html 2>/dev/null | head -1 || echo "")
          XLSX=$(ls -t reports/nifty100_daily_report_*.xlsx 2>/dev/null | head -1 || echo "")
          LOG="logs/run_github_output.log"
          echo "html_file=$HTML" >> $GITHUB_OUTPUT
          echo "xlsx_file=$XLSX" >> $GITHUB_OUTPUT
          echo "log_file=$LOG" >> $GITHUB_OUTPUT

      - name: Send success email
        if: steps.final_status.outputs.result == 'SUCCESS'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: lightsonlearning01@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[GitHub Actions] - Nifty 100 EMA Report - ${{ env.TODAY }} - SUCCESS"
          to: udaymanju91@gmail.com
          from: "Nifty Reporter "
          body: |
            NIFTY 100 DAILY EMA Crossover REPORTER - SUCCESSFUL RUN

            Run ID : ${{ github.run_id }}
            Triggered Event : ${{ github.event_name }}
            Trigger Source : ${{ env.TRIGGER_SOURCE }}
            Status : SUCCESS

            Files attached:
            - HTML Report
            - Excel Report
            - Execution Log

            All output files have been committed to the GitHub repository
            under /reports and /logs folders for 90-day audit retention.

            - Nifty 100 Reporter (GitHub Actions)
          attachments: "${{ steps.find_files.outputs.html_file }},${{ steps.find_files.outputs.xlsx_file }},${{ steps.find_files.outputs.log_file }}"

      - name: Send failure email
        if: steps.final_status.outputs.result == 'FAILURE'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: lightsonlearning01@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[GitHub Actions] - Nifty 100 EMA Report - ${{ env.TODAY }} - FAILED"
          to: udaymanju91@gmail.com
          from: "Nifty Reporter "
          body: |
            NIFTY 100 DAILY EMA Crossover REPORTER - FAILED RUN

            Run ID : ${{ github.run_id }}
            Triggered Event : ${{ github.event_name }}
            Trigger Source : ${{ env.TRIGGER_SOURCE }}
            Status : FAILURE

            The script encountered an error. The execution log is attached.
            Please review the log to identify the root cause.

            Common causes:
            - NSE / niftyindices.com API timeout (re-run usually fixes this)
            - yfinance rate limit (wait 30 min and re-run)
            - Missing data file on first run (run once manually to bootstrap)

            To manually re-trigger:
            Go to your GitHub repo -> Actions -> Nifty 100 Daily Reporter -> Run workflow

            - Nifty 100 Reporter (GitHub Actions)
          attachments: "${{ steps.find_files.outputs.log_file }}"

      - name: Send skipped email
        if: steps.final_status.outputs.result == 'SKIPPED'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: lightsonlearning01@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[GitHub Actions] - Nifty 100 EMA Report - ${{ env.TODAY }} - SKIPPED"
          to: udaymanju91@gmail.com
          from: "Nifty Reporter "
          body: |
            NIFTY 100 DAILY EMA Crossover REPORTER - SKIPPED RUN

            Run ID : ${{ github.run_id }}
            Triggered Event : ${{ github.event_name }}
            Trigger Source : ${{ env.TRIGGER_SOURCE }}
            Status : SKIPPED

            A successful run for this workflow already existed today,
            so this duplicate execution was safely skipped.

            See attached log for full details.

            - Nifty 100 Reporter (GitHub Actions)
          attachments: "${{ steps.find_files.outputs.log_file }}"

      - name: Commit reports and logs to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ logs/ data/ || true
          git diff --staged --quiet || git commit -m "Auto-report: $(date '+%Y-%m-%d') [${{ steps.final_status.outputs.result }}]"
          git push || true

      - name: Remove files older than 90 days
        if: always()
        run: |
          find reports/ -name "*.html" -mtime +90 -delete 2>/dev/null || true
          find reports/ -name "*.xlsx" -mtime +90 -delete 2>/dev/null || true
          find logs/ -name "*.log" -mtime +90 -delete 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A reports/ logs/ || true
          git diff --staged --quiet || git commit -m "Cleanup: removed files older than 90 days"
          git push || true
